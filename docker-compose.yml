version: "3.9"

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # El navegador del usuario llama a Kong directamente, por eso es localhost
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: lilfac-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - lilfac-net

networks:
  # Se une a la red ya creada por el docker-compose del backend
  lilfac-net:
    external: true
    name: lilfac-net
